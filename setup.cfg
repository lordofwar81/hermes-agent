[mutmut]
source_paths=.
# Scope to ONLY the 4 audited source files (avoid mutating the whole 1.2M LOC tree)
only_mutate=
    agent/routing.py
    plugins/memory/holographic/store.py
    plugins/memory/holographic/reranker.py
    plugins/memory/holographic/holographic.py
# Point mutmut at the test files that exercise the audited code
pytest_add_cli_args_test_selection=
    tests/test_audit_2026_07_18_regressions.py
    tests/plugins/memory/test_memory_store.py
    tests/plugins/memory/test_reranker.py
